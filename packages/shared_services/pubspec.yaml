name: shared_services
description: "Shared Supabase, location and notification services for Çekici app"
version: 1.0.0
publish_to: 'none'

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.5.0
  geolocator: ^13.0.1
  flutter_local_notifications: ^17.2.2
  flutter_dotenv: ^5.1.0
  http: ^1.2.0
  agora_rtc_engine: ^6.3.0
  permission_handler: ^11.3.1

  shared_models:
    path: ../shared_models
  firebase_core: ^3.11.0
  firebase_messaging: ^15.1.0
  audioplayers: ^6.0.0
