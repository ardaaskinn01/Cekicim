workflows:
  customer-app-ios:
    name: Cekici Musteri iOS
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: apps/customer_app
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
      watched_patterns:
        - apps/customer_app/**
        - packages/**
    scripts:
      - name: Melos Bootstrap
        script: |
          cd ../..
          dart pub global activate melos
          melos bootstrap
      - name: Create .env file
        script: |
          echo "SUPABASE_URL=$SUPABASE_URL" > .env
          echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> .env
          echo "AGORA_APP_ID=$AGORA_APP_ID" >> .env
      - name: Fetch CocoaPods
        script: |
          cd ios
          pod install
      - name: Build iOS IPA
        script: |
          flutter build ipa --release --export-options-plist=$HOME/export_options.plist

  driver-app-ios:
    name: Cekici Surucu iOS
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: apps/driver_app
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
      watched_patterns:
        - apps/driver_app/**
        - packages/**
    scripts:
      - name: Melos Bootstrap
        script: |
          cd ../..
          dart pub global activate melos
